<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>American Life – Veli İletişim</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
  <div class="header-icon"><i class="fas fa-users"></i></div>
  <div>
    <h1>Veli İletişim</h1>
    <span>American Life</span>
  </div>
  <button class="resources-btn" onclick="openResources()" title="Kaynaklar"><i class="fas fa-folder-open"></i></button>
</header>

<div class="region-filter-bar" id="regionFilterBar"></div>

<div class="class-bar" id="classBar">
  <button class="add-class-btn" id="addClassBtn" onclick="openModal(null)"><i class="fas fa-plus"></i></button>
</div>

<div class="app" id="appRoot"></div>

<!-- RESOURCES SHEET -->
<div class="modal-backdrop" id="resourcesBackdrop" onclick="closeResourcesOnBackdrop(event)">
  <div class="modal" id="resourcesModal">
    <div class="modal-handle"></div>
    <h2><i class="fas fa-folder-open"></i> Kaynaklar</h2>

    <a class="resource-link-card" href="https://drive.google.com/drive/folders/1mWur-_kbmXTMyqIS9U1KUQQx_3oNIQH4" target="_blank" rel="noopener">
      <div class="resource-icon"><i class="fas fa-file-alt"></i></div>
      <div class="resource-info">
        <div class="resource-title">Sınavlar</div>
        <div class="resource-sub">Google Drive klasörü</div>
      </div>
      <div class="resource-arrow"><i class="fas fa-external-link-alt"></i></div>
    </a>
    
    <a class="resource-link-card" href="https://drive.google.com/drive/folders/18mvxoQWoquQnWsX-73VwfWt-sHNNd_nM" target="_blank" rel="noopener">
      <div class="resource-icon"><i class="fas fa-book"></i></div>
      <div class="resource-info">
        <div class="resource-title">Kitapçıklar</div>
        <div class="resource-sub">Google Drive klasörü</div>
      </div>
      <div class="resource-arrow"><i class="fas fa-external-link-alt"></i></div>
    </a>

    <div class="resource-card">
      <div class="resource-card-header">
        <div class="resource-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div class="resource-info">
          <div class="resource-title">Atakum</div>
          <div class="resource-sub" id="atakumSub">Telegram grubu</div>
        </div>
      </div>
      <div class="resource-actions">
        <button class="resource-action-btn" onclick="openRegionLink('Atakum')"><i class="fab fa-telegram-plane"></i> Telegram</button>
        <button class="resource-action-btn" onclick="triggerImageUpload('Atakum')"><i class="fas fa-image"></i> Görsel</button>
      </div>
      <img class="resource-image-preview" id="atakumImage" alt="Atakum kaynak görseli">
      <input type="file" id="fileAtakum" accept="image/*" style="display:none" onchange="handleImageUpload('Atakum', this)">
    </div>

    <div class="resource-card">
      <div class="resource-card-header">
        <div class="resource-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div class="resource-info">
          <div class="resource-title">İlkadım</div>
          <div class="resource-sub" id="ilkadimSub">Telegram grubu</div>
        </div>
      </div>
      <div class="resource-actions">
        <button class="resource-action-btn" onclick="openRegionLink('İlkadım')"><i class="fab fa-telegram-plane"></i> Telegram</button>
        <button class="resource-action-btn" onclick="triggerImageUpload('İlkadım')"><i class="fas fa-image"></i> Görsel</button>
      </div>
      <img class="resource-image-preview" id="ilkadimImage" alt="İlkadım kaynak görseli">
      <input type="file" id="fileIlkadim" accept="image/*" style="display:none" onchange="handleImageUpload('İlkadım', this)">
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeResources()">Kapat</button>
    </div>
  </div>
</div>

<!-- CLASS MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Yeni Sınıf Ekle</h2>

    <div class="region-picker">
      <button type="button" class="region-pick-btn" id="regionPickAtakum" onclick="pickRegion('Atakum')"><i class="fas fa-map-marker-alt"></i> Atakum</button>
      <button type="button" class="region-pick-btn" id="regionPickIlkadim" onclick="pickRegion('İlkadım')"><i class="fas fa-map-marker-alt"></i> İlkadım</button>
    </div>

    <div class="modal-field">
      <label><i class="fas fa-tag"></i> Sınıf Adı</label>
      <input type="text" id="mClassName" placeholder="Örn. C+, B1, Advanced" autocomplete="off">
    </div>
    
    <div class="modal-field">
      <label><i class="fas fa-calendar-day"></i> Gün(ler)</label>
      <input type="text" id="mDay" placeholder="Örn. Pazartesi, Çarşamba" autocomplete="off">
    </div>
    
    <div class="modal-field">
      <label><i class="fas fa-clock"></i> Saat</label>
      <div class="modal-time-row">
        <input type="time" id="mTimeStart">
        <input type="time" id="mTimeEnd">
      </div>
    </div>

    <div class="modal-field">
      <label><i class="fas fa-user-graduate"></i> Öğrenciler</label>
      <div class="student-builder" id="studentBuilder"></div>
      <button class="add-student-row" type="button" onclick="addStudentRow()"><i class="fas fa-plus"></i> Öğrenci Ekle</button>
      <button class="bulk-import-btn" type="button" onclick="openBulkImport()"><i class="fas fa-paste"></i> Toplu Yapıştır</button>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">İptal</button>
      <button class="modal-btn primary" onclick="saveClass()">Kaydet</button>
    </div>
    
    <button class="delete-class-btn" id="deleteClassBtn" onclick="deleteClass()" style="display:none"><i class="fas fa-trash-alt"></i> Sınıfı Sil</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="index.js"></script>
</body>
</html>
