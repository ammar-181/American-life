<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AL | Veli İletişim Paneli</title>
<meta name="description" content="American Life öğretmenleri için veli bilgilendirme paneli — yoklama, devam durumu ve ders takibi WhatsApp ve Telegram üzerinden tek dokunuşla.">
<!-- Open Graph / WhatsApp / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://americanlife.example.com/veli-iletisim">
<meta property="og:title" content="American Life | Veli İletişim Paneli">
<meta property="og:description" content="Öğretmenler için veli bilgilendirme paneli — yoklama, devam durumu ve ders takibini WhatsApp ve Telegram üzerinden tek dokunuşla yönetin.">
<meta property="og:image" content="american_life_bursa_cover.jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="American Life">
<meta property="og:locale" content="tr_TR">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="American Life | Veli İletişim Paneli">
<meta name="twitter:description" content="Yoklama, devam durumu ve ders takibini WhatsApp ve Telegram üzerinden tek dokunuşla yönetin.">
<meta name="twitter:image" content="american_life_bursa_cover.jpeg">
<!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="LOOOGO.png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="index.css">
</head>
<body>

<header>
  <div class="header-icon">
    <img src="LOOOGO.png" alt="Header Icon">
  </div>
  <h1>Veli İletişim</h1>
  <span>American Life</span>
  <button class="resources-btn" onclick="openResources()" title="Kaynaklar"><i class="fa-solid fa-folder-open"></i></button>
</header>

<div class="region-filter-bar" id="regionFilterBar"></div>

<div class="class-bar" id="classBar">
  <button class="add-class-btn" id="addClassBtn" onclick="openModal(null)"><i class="fa-solid fa-plus"></i></button>
</div>

<div class="app" id="appRoot"></div>

<!-- RESOURCES SHEET -->
<div class="modal-backdrop" id="resourcesBackdrop" onclick="closeResourcesOnBackdrop(event)">
  <div class="modal" id="resourcesModal">
    <div class="modal-handle"></div>
    <h2><i class="fa-solid fa-folder-open"></i>Kaynaklar</h2>

    <a class="resource-link-card" href="https://drive.google.com/drive/folders/1mWur-_kbmXTMyqIS9U1KUQQx_3oNIQH4" target="_blank" rel="noopener" style="display:flex; align-items:center; gap:13px; border:1.5px solid var(--border); border-radius:13px; padding:14px; text-decoration:none; color:var(--text); margin-bottom:10px;">
      <div class="resource-icon"><i class="fa-solid fa-file-pen"></i></div>
      <div class="resource-info">
        <div class="resource-title">Sınavlar</div>
        <div class="resource-sub">Google Drive klasörü</div>
      </div>
      <div style="color:var(--slate); font-size:14px;"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
    </a>
    <a class="resource-link-card" href="https://drive.google.com/drive/folders/18mvxoQWoquQnWsX-73VwfWt-sHNNd_nM" target="_blank" rel="noopener" style="display:flex; align-items:center; gap:13px; border:1.5px solid var(--border); border-radius:13px; padding:14px; text-decoration:none; color:var(--text); margin-bottom:10px;">
      <div class="resource-icon"><i class="fa-solid fa-book"></i></div>
      <div class="resource-info">
        <div class="resource-title">Kitapçıklar (Booklets)</div>
        <div class="resource-sub">Google Drive klasörü</div>
      </div>
      <div style="color:var(--slate); font-size:14px;"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
    </a>

    <a class="resource-link-card" href="https://joedtech.com/login?returnTo=%2Fteacher%2Fclass-detail%3Flayout%3Dteacher%26brandId%3D9bc24fc0-19d6-4cea-9804-6d6dc8c33e63%26branchId%3D97de961b-9d06-46bb-8e7a-6fb7aa7e9028%26class_id%3Da4a74727-6276-4fbd-936d-fb09e0d9289c%26tab%3Dinfo" target="_blank" rel="noopener" style="display:flex; align-items:center; gap:13px; border:1.5px solid var(--border); border-radius:13px; padding:14px; text-decoration:none; color:var(--text); margin-bottom:10px;">
      <div class="resource-icon"><i class="fa-solid fa-globe"></i></div>
      <div class="resource-info">
        <div class="resource-title">Art System</div>
        <div class="resource-sub">Web sitesi</div>
      </div>
      <div style="color:var(--slate); font-size:14px;"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
    </a>

    <div class="resource-link-card" style="display:flex; align-items:center; gap:13px; border:1.5px solid var(--border); border-radius:13px; padding:14px; text-decoration:none; color:var(--text); margin-bottom:16px; cursor:pointer;" onclick="document.getElementById('scheduleUpload').click()">
      <div class="resource-icon"><i class="fa-solid fa-calendar"></i></div>
      <div class="resource-info">
        <div class="resource-title">My Schedule</div>
        <div class="resource-sub" id="scheduleStatus">Programınızı yükleyin</div>
      </div>
      <div style="color:var(--slate); font-size:14px;"><i class="fa-solid fa-upload"></i></div>
    </div>
    <input type="file" id="scheduleUpload" accept="image/*" style="display:none" onchange="handleScheduleUpload(this)">
    <div id="schedulePreviewContainer" style="display:none; margin-bottom:16px;">
      <img id="schedulePreview" style="width:100%; border-radius:10px; border:1.5px solid var(--border);">
    </div>

    <div class="modal-actions" style="margin-top: 4px;">
      <button class="modal-btn cancel" onclick="closeResources()">Kapat</button>
    </div>
  </div>
</div>

<!-- CLASS MODAL — bottom sheet -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Yeni Sınıf Ekle</h2>

    <div class="region-picker">
      <button type="button" class="region-pick-btn" id="regionPickAtakum" onclick="pickRegion('Atakum')"><i class="fa-solid fa-location-dot"></i> Atakum</button>
      <button type="button" class="region-pick-btn" id="regionPickIlkadim" onclick="pickRegion('İlkadım')"><i class="fa-solid fa-location-dot"></i> İlkadım</button>
    </div>

    <div class="modal-field">
      <label>Sınıf Adı</label>
      <input type="text" id="mClassName" placeholder="örn. C+, B1, Advanced" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>Gün(ler)</label>
      <input type="text" id="mDay" placeholder="örn. Pazar, Cumartesi" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>Saat</label>
      <div class="modal-time-row">
        <input type="time" id="mTimeStart">
        <input type="time" id="mTimeEnd">
      </div>
    </div>

    <div class="modal-field">
      <label>Öğrenciler</label>
      <div class="student-builder" id="studentBuilder"></div>
      <button class="add-student-row" type="button" onclick="addStudentRow()"><i class="fa-solid fa-plus"></i> Öğrenci Ekle</button>
      <button class="bulk-import-btn" type="button" onclick="openBulkImport()"><i class="fa-solid fa-paste"></i> Toplu Yapıştır (Ad - Telefon)</button>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">İptal</button>
      <button class="modal-btn primary" onclick="saveClass()">Kaydet</button>
    </div>
    <button class="delete-class-btn" id="deleteClassBtn" onclick="deleteClass()" style="display:none"><i class="fa-solid fa-trash"></i> Bu Sınıfı Sil</button>
  </div>
</div>

<!-- Supabase client SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="index.js"></script>
</body>
</html>
