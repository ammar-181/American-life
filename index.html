<!-- index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>American Life – Veli İletişim</title>
    <link rel="stylesheet" href="../index.css">
</head>
<body>

<header>
    <div class="header-icon">📋</div>
    <div>
        <h1>Veli İletişim</h1>
        <span>American Life</span>
    </div>
    <button class="resources-btn" onclick="openResources()" title="Kaynaklar">📁</button>
</header>

<div class="region-filter-bar" id="regionFilterBar"></div>

<div class="class-bar" id="classBar">
    <button class="add-class-btn" id="addClassBtn" onclick="openModal(null)">+</button>
</div>

<div class="app" id="appRoot"></div>

<!-- RESOURCES SHEET -->
<div class="modal-backdrop" id="resourcesBackdrop" onclick="closeResourcesOnBackdrop(event)">
    <div class="modal" id="resourcesModal">
        <div class="modal-handle"></div>
        <h2>📁 Kaynaklar</h2>
        <a class="resource-link-card" href="https://drive.google.com/drive/folders/1mWur-_kbmXTMyqIS9U1KUQQx_3oNIQH4" target="_blank" rel="noopener">
            <div class="resource-icon">📝</div>
            <div class="resource-info">
                <div class="resource-title">Sınavlar</div>
                <div class="resource-sub">Google Drive klasörü</div>
            </div>
            <div class="resource-arrow">↗</div>
        </a>
        <a class="resource-link-card" href="https://drive.google.com/drive/folders/18mvxoQWoquQnWsX-73VwfWt-sHNNd_nM" target="_blank" rel="noopener">
            <div class="resource-icon">📘</div>
            <div class="resource-info">
                <div class="resource-title">Kitapçıklar (Booklets)</div>
                <div class="resource-sub">Google Drive klasörü</div>
            </div>
            <div class="resource-arrow">↗</div>
        </a>

        <div class="resource-extra-row">
            <div class="resource-extra-card" id="resourceAtakumCard" onclick="openRegionLink('Atakum')">
                <span class="big-icon">📍</span>
                <div class="label">Atakum-More</div>
                <div class="sub" id="atakumSub">Telegram grubu</div>
                <img id="atakumImage" class="custom-image" style="display:none" alt="Atakum image" />
                <button class="image-upload-btn" onclick="event.stopPropagation(); triggerImageUpload('Atakum')">📤 Resim yükle</button>
                <input type="file" id="fileAtakum" accept="image/*" style="display:none" onchange="handleImageUpload('Atakum', this)">
            </div>
            <div class="resource-extra-card" id="resourceIlkadimCard" onclick="openRegionLink('İlkadım')">
                <span class="big-icon">📍</span>
                <div class="label">İlkadım-More</div>
                <div class="sub" id="ilkadimSub">Telegram grubu</div>
                <img id="ilkadimImage" class="custom-image" style="display:none" alt="İlkadım image" />
                <button class="image-upload-btn" onclick="event.stopPropagation(); triggerImageUpload('İlkadım')">📤 Resim yükle</button>
                <input type="file" id="fileIlkadim" accept="image/*" style="display:none" onchange="handleImageUpload('İlkadım', this)">
            </div>
        </div>

        <div class="modal-actions" style="margin-top: 8px;">
            <button class="modal-btn cancel" onclick="closeResources()">Kapat</button>
        </div>
    </div>
</div>

<!-- CLASS EDIT MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
    <div class="modal" id="modal">
        <div class="modal-handle"></div>
        <h2 id="modalTitle">Yeni Sınıf Ekle</h2>

        <div class="modal-field">
            <label>Sınıf Adı</label>
            <input type="text" id="mClassName" placeholder="örn. C+, B1, Advanced" autocomplete="off">
        </div>
        <div class="modal-field">
            <label>Bölge</label>
            <div style="display:flex; gap:8px;">
                <button type="button" class="region-pick-btn" id="regionPickAtakum" onclick="pickRegion('Atakum')" style="flex:1; padding:11px; border-radius:10px; border:2px solid var(--border); background:#fff; font-size:14px; font-weight:600; color:var(--slate); font-family:inherit; cursor:pointer;">Atakum</button>
                <button type="button" class="region-pick-btn" id="regionPickIlkadim" onclick="pickRegion('İlkadım')" style="flex:1; padding:11px; border-radius:10px; border:2px solid var(--border); background:#fff; font-size:14px; font-weight:600; color:var(--slate); font-family:inherit; cursor:pointer;">İlkadım</button>
            </div>
        </div>
        <div class="modal-field">
            <label>Gün</label>
            <input type="text" id="mDay" placeholder="örn. Pazar, Cumartesi" autocomplete="off">
        </div>
        <div class="modal-field">
            <label>Saat</label>
            <input type="text" id="mTime" placeholder="örn. 13.30 – 15.50" autocomplete="off">
        </div>

        <div class="modal-field">
            <label>Öğrenciler</label>
            <div class="student-builder" id="studentBuilder"></div>
            <button class="add-student-row" onclick="addStudentRow()">+ Öğrenci Ekle</button>
            <button class="add-student-row" onclick="openBulkImport()" style="margin-top:6px;">📋 Toplu Yapıştır (Ad - Numara)</button>
        </div>

        <div class="modal-actions">
            <button class="modal-btn cancel" onclick="closeModal()">İptal</button>
            <button class="modal-btn primary" onclick="saveClass()">Kaydet</button>
        </div>
        <button class="delete-class-btn" id="deleteClassBtn" onclick="deleteClass()" style="display:none">🗑 Bu Sınıfı Sil</button>
    </div>
</div>

<script src="../index.js"></script>
</body>
</html>
